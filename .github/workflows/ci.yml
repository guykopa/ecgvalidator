name: ECG Validator CI

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 src/ tests/

      - name: Type check with mypy
        run: mypy src/

      - name: Run test campaign
        run: pytest tests/ -v --cov=src --cov-report=html --cov-fail-under=90

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Generate pipeline figures
        run: python docs/generate_figures.py

      - name: Build Sphinx docs
        run: sphinx-build -b html docs docs/_build/html -W --keep-going
